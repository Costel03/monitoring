server:
  persistentVolume:
    enabled: true
    size: 8Gi
    storageClass: nfs-client

  retention: "15d"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

alertmanager:
  enabled: true
  persistence:
    size: 2Gi
    storageClass: nfs-client

pushgateway:
  enabled: false

nodeExporter:
  enabled: true

kube-state-metrics:
  enabled: true
