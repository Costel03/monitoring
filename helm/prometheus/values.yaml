server:
  persistentVolume:
    enabled: true
    size: 8Gi
    storageClass: nfs-client

  retention: "15d"

  global:
    scrape_interval: 60s
    evaluation_interval: 60s

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 1Gi

alertmanager:
  enabled: true
  persistence:
    size: 2Gi
    storageClass: nfs-client

pushgateway:
  enabled: false

nodeExporter:
  enabled: true

kube-state-metrics:
  enabled: true
